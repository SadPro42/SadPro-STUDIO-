<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* Reset base per eliminare i margini di default */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Impostazioni del corpo della pagina */
        body {
            background-color: #c7c7c7; /* Colore di sfondo dell'immagine */
            height: 100vh;            /* Prende tutta l'altezza dello schermo */
            display: flex;
            justify-content: center;  /* Centra orizzontalmente */
            align-items: center;      /* Centra verticalmente */
            overflow: hidden;         /* Evita barre di scorrimento */
            position: relative;       /* Base per posizionare il canvas */
        }

        /* 1. L'immagine centrata (Livello 1 - Sotto) */
        .centered-image {
            max-width: 90%;           /* Adattamento schermi piccoli */
            max-height: 90vh;
            object-fit: contain;      /* Mantiene proporzioni */
            position: relative;
            z-index: 1;               /* Livello più basso */
        }

        /* 2. Il Canvas delle palline (Livello 2 - Sopra) */
        #bg-canvas {
            position: absolute;       /* Sovrapposizione assoluta */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;               /* Livello superiore: va SOPRA l'immagine */
            pointer-events: none;     /* IMPORTANTE: Permette di toccare l'immagine sotto se necessario */
        }
    </style>
</head>
<body>

    <!-- IMPORTANTE: L'immagine viene dichiarata PRIMA per stare sotto -->
    <img src="wip.jpg" alt="Sito in Costruzione" class="centered-image">

    <!-- Il Canvas per le palline sovrapposto -->
    <canvas id="bg-canvas"></canvas>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // Ridimensiona il canvas a tutto schermo
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particlesArray = [];
        // Aumentato leggermente il numero di palline per riempire l'area
        const numberOfParticles = 60; 

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Dimensione delle palline leggermente più grande per visibilità
                this.size = Math.random() * 6 + 4; 
                
                // Velocità molto ridotta per l'effetto fluttuante
                this.speedX = (Math.random() * 0.3) - 0.15; 
                this.speedY = (Math.random() * 0.3) - 0.15;
                
                // Colore bianco semi-trasparente (rgba) per l'effetto sfocatura
                this.color = 'rgba(255, 255, 255, 0.4)'; 
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Fai rimbalzare le palline ai bordi dello schermo
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray.length = 0; // Pulisce l'array se necessario
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
